<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daffy - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #000000;
            min-height: 100vh;
            color: #ffffff;
        }
        .auth-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        .input-field {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 12px 16px;
            color: white;
            width: 100%;
            transition: all 0.3s ease;
        }
        .input-field option {
            background: #1a1a1a;
            color: white;
        }
        .input-field:focus {
            outline: none;
            border-color: #facc15;
            background: rgba(255, 255, 255, 0.15);
        }
        .auth-btn {
            background: #facc15;
            color: #000000;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(250, 204, 21, 0.3);
        }
        .social-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 12px 24px;
            color: #ffffff;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .social-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: #facc15;
        }
        .error-message {
            color: #ff4444;
            font-size: 0.875rem;
            margin-top: 0.5rem;
            display: none;
        }
        .badge-icon {
            position: relative;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .badge-icon.teacher {
            color: #10b981; /* green */
        }
        .badge-icon.alumni {
            color: #3b82f6; /* blue */
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">
    <div class="auth-card p-8 w-full max-w-md">
        <div class="text-center mb-8">
            <div class="flex justify-center items-center gap-2 mb-4">
                <span class="material-icons text-[#facc15]" style="font-size:3rem;">bubble_chart</span>
                <span class="text-4xl font-bold text-[#facc15]">Daffy</span>
            </div>
            <h2 class="text-2xl font-bold" id="authTitle">Welcome Back!</h2>
            <p class="text-gray-400" id="authSubtitle">Sign in to continue</p>
        </div>

        <!-- Login Form -->
        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-gray-300 mb-2">Email</label>
                <input type="email" id="email" class="input-field" placeholder="Enter your email" required>
                <div id="emailError" class="error-message">Please enter a valid email address</div>
            </div>
            <div>
                <label class="block text-gray-300 mb-2">Password</label>
                <input type="password" id="password" class="input-field" placeholder="Enter your password" required>
                <div id="passwordError" class="error-message">Invalid email or password</div>
            </div>
            <div class="flex items-center justify-between">
                <label class="flex items-center">
                    <input type="checkbox" id="rememberMe" class="rounded border-gray-300 text-[#facc15] focus:ring-[#facc15]">
                    <span class="ml-2 text-sm text-gray-300">Remember me</span>
                </label>
                <a href="#" class="text-sm text-[#facc15] hover:underline">Forgot password?</a>
            </div>
            <button type="submit" class="auth-btn w-full">Sign In</button>
            <div class="relative my-6">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-gray-600"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                    <span class="px-2 bg-transparent text-gray-300">Or continue with</span>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <button type="button" class="social-btn">
                    <img src="https://www.google.com/favicon.ico" alt="Google" class="w-5 h-5">
                    Google
                </button>
                <button type="button" class="social-btn">
                    <img src="https://www.facebook.com/favicon.ico" alt="Facebook" class="w-5 h-5">
                    Facebook
                </button>
            </div>
        </form>

        <!-- Register Form -->
        <form id="registerForm" class="space-y-6 hidden">
            <div>
                <label class="block text-gray-300 mb-2">Full Name</label>
                <input type="text" id="fullName" class="input-field" placeholder="Full Name" required>
                <div id="fullNameError" class="error-message">Please enter your full name</div>
            </div>
            <div>
                <label class="block text-gray-300 mb-2">Username</label>
                <input type="text" id="username" class="input-field" placeholder="Username" required>
                <div id="usernameError" class="error-message">Username is already taken</div>
            </div>
            <div>
                <label class="block text-gray-300 mb-2">Email</label>
                <input type="email" id="regEmail" class="input-field" placeholder="Email" required>
                <div id="regEmailError" class="error-message">Email is already registered</div>
            </div>
            <div>
                <label class="block text-gray-300 mb-2">Password</label>
                <input type="password" id="regPassword" class="input-field" placeholder="Password" required>
                <div id="regPasswordError" class="error-message">Password must be at least 6 characters</div>
            </div>
            <div>
                <label class="block text-gray-300 mb-2">User Type</label>
                <select id="userType" class="input-field" required onchange="toggleUserFields()">
                    <option value="">Select User Type</option>
                    <option value="student">Student</option>
                    <option value="teacher">Teacher</option>
                    <option value="alumni">Alumni</option>
                </select>
            </div>
            <div>
                <label class="block text-gray-300 mb-2">Department</label>
                <select id="department" class="input-field" required>
                    <option value="">Select Department</option>
                    <option value="CSE">Computer Science & Engineering</option>
                    <option value="EEE">Electrical & Electronic Engineering</option>
                    <option value="CE">Civil Engineering</option>
                    <option value="ME">Mechanical Engineering</option>
                    <option value="IPE">Industrial & Production Engineering</option>
                    <option value="TE">Textile Engineering</option>
                    <option value="ARCH">Architecture</option>
                    <option value="URP">Urban & Regional Planning</option>
                </select>
            </div>
            <div id="semesterField">
                <label class="block text-gray-300 mb-2">Semester</label>
                <select id="semester" class="input-field">
                    <option value="">Select Semester</option>
                    <option value="1">1st Semester</option>
                    <option value="2">2nd Semester</option>
                    <option value="3">3rd Semester</option>
                    <option value="4">4th Semester</option>
                    <option value="5">5th Semester</option>
                    <option value="6">6th Semester</option>
                    <option value="7">7th Semester</option>
                    <option value="8">8th Semester</option>
                </select>
            </div>
            <div id="batchField" class="hidden">
                <label class="block text-gray-300 mb-2" id="yearLabel">Graduation Year</label>
                <input type="number" id="batch" class="input-field" placeholder="Graduation Year" min="1990" max="2099">
            </div>
            <button type="submit" class="auth-btn w-full">Create Account</button>
        </form>

        <div class="text-center mt-6">
            <button onclick="toggleAuth()" class="text-[#facc15] hover:underline" id="authToggle">
                Don't have an account? Sign Up
            </button>
        </div>
    </div>

    <script>
        // Check if user is logged in
        function isLoggedIn() {
            return localStorage.getItem('isLoggedIn') === 'true';
        }

        if (isLoggedIn()) {
            window.location.href = 'home.html';
        }

        // Toggle between login and register forms
        function toggleAuth() {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const authTitle = document.getElementById('authTitle');
            const authSubtitle = document.getElementById('authSubtitle');
            const authToggle = document.getElementById('authToggle');

            if (loginForm.classList.contains('hidden')) {
                loginForm.classList.remove('hidden');
                registerForm.classList.add('hidden');
                authTitle.textContent = 'Welcome Back!';
                authSubtitle.textContent = 'Sign in to continue';
                authToggle.textContent = "Don't have an account? Sign Up";
            } else {
                loginForm.classList.add('hidden');
                registerForm.classList.remove('hidden');
                authTitle.textContent = 'Create Account';
                authSubtitle.textContent = 'Join the Daffy community';
                authToggle.textContent = 'Already have an account? Sign In';
            }
        }

        // Toggle user fields based on user type
        function toggleUserFields() {
            const userType = document.getElementById('userType').value;
            const semesterField = document.getElementById('semesterField');
            const batchField = document.getElementById('batchField');
            const yearLabel = document.getElementById('yearLabel');
            const batch = document.getElementById('batch');

            if (userType === 'student') {
                semesterField.classList.remove('hidden');
                batchField.classList.add('hidden');
                document.getElementById('semester').required = true;
                document.getElementById('batch').required = false;
            } else {
                semesterField.classList.add('hidden');
                batchField.classList.remove('hidden');
                document.getElementById('semester').required = false;
                document.getElementById('batch').required = true;
                
                if (userType === 'teacher') {
                    yearLabel.textContent = 'Joining Year';
                    batch.placeholder = 'Joining Year';
                } else {
                    yearLabel.textContent = 'Graduation Year';
                    batch.placeholder = 'Graduation Year';
                }
            }
        }

        // Handle login
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;

            // Reset error messages
            document.getElementById('emailError').style.display = 'none';
            document.getElementById('passwordError').style.display = 'none';

            // Validate email format
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                document.getElementById('emailError').style.display = 'block';
                return;
            }

            // Get users from localStorage
            const users = JSON.parse(localStorage.getItem('users')) || [];

            // Find user
            const user = users.find(u => u.email === email && u.password === password);

            if (!user) {
                document.getElementById('passwordError').style.display = 'block';
                return;
            }

            // Store login state
            localStorage.setItem('isLoggedIn', 'true');

            // Store user data (excluding password)
            const userData = { ...user };
            delete userData.password;
            localStorage.setItem('userData', JSON.stringify(userData));

            // Store remember me preference
            if (rememberMe) {
                localStorage.setItem('rememberMe', 'true');
            } else {
                localStorage.removeItem('rememberMe');
            }

            // Redirect to profile page
            window.location.href = 'profile.html';
        });

        // Handle registration
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const fullName = document.getElementById('fullName').value;
            const username = document.getElementById('username').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const userType = document.getElementById('userType').value;
            const department = document.getElementById('department').value;

            // Reset error messages
            document.getElementById('fullNameError').style.display = 'none';
            document.getElementById('usernameError').style.display = 'none';
            document.getElementById('regEmailError').style.display = 'none';
            document.getElementById('regPasswordError').style.display = 'none';

            // Validate inputs
            if (!fullName.trim()) {
                document.getElementById('fullNameError').style.display = 'block';
                return;
            }
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                document.getElementById('regEmailError').style.display = 'block';
                return;
            }
            if (password.length < 6) {
                document.getElementById('regPasswordError').style.display = 'block';
                return;
            }

            const users = JSON.parse(localStorage.getItem('users')) || [];
            if (users.some(user => user.email === email)) {
                document.getElementById('regEmailError').style.display = 'block';
                return;
            }
            if (users.some(user => user.username === username)) {
                document.getElementById('usernameError').style.display = 'block';
                return;
            }

            const newUser = {
                fullName,
                username,
                email,
                password, // Note: In production, hash passwords
                department,
                userType,
                createdAt: new Date().toISOString()
            };

            if (userType === 'student') {
                newUser.semester = document.getElementById('semester').value;
            } else {
                newUser.batch = document.getElementById('batch').value;
                newUser.badge = userType === 'teacher' ?
                    '<span class="badge-icon teacher"><span class="material-icons">school</span>Teacher</span>' :
                    '<span class="badge-icon alumni"><span class="material-icons">workspace_premium</span>Alumni</span>';
            }

            // Add new user
            users.push(newUser);
            localStorage.setItem('users', JSON.stringify(users));

            // Auto login after registration
            localStorage.setItem('isLoggedIn', 'true');
            const userData = { ...newUser };
            delete userData.password;
            localStorage.setItem('userData', JSON.stringify(userData));

            // Redirect to profile page
            window.location.href = 'profile.html';
        });

        // Check for remember me
        if (localStorage.getItem('rememberMe') === 'true') {
            document.getElementById('rememberMe').checked = true;
        }
    </script>
</body>
</html>
<style>

    .input-field {

    }

    .social-btn:hover {
        background: rgba(255, 255, 255, 0.2);
        border-color: #facc15;
    }
    .error-message {
        color: #ff4444;

    }

        position: relative;
        display: inline-flex;

        color: #10b981; /* green */
    }
    .badge-icon.alumni {
        color: #3b82f6; /* blue */
    }
    
    /* Enhanced Mobile Responsiveness */
    @media (max-width: 480px) {
        .auth-card {
            padding: 1rem;
            margin: 0;
            width: 100%;
            border-radius: 0;
            min-height: 100vh;
        }
        
        body {
            padding: 0;
        }
        
        .p-6 {
            padding: 0;
        }
        
        .input-field {
            font-size: 16px; /* Prevents iOS zoom */
            padding: 12px;
        }
        
        .social-btn {
            padding: 12px;
            width: 100%;
        }
        
        .grid-cols-2 {
            grid-template-columns: 1fr;
            gap: 0.75rem;
        }
        
        .space-y-6 > * + * {
            margin-top: 1rem;
        }
        
        .flex.items-center.justify-between {
            flex-direction: column;
            gap: 1rem;
            align-items: stretch;
            text-align: center;
        }
        
        .text-4xl {
            font-size: 1.5rem;
        }
        
        .text-2xl {
            font-size: 1.25rem;
        }
    }
    
    /* Touch Device Optimization */
    @media (hover: none) and (pointer: coarse) {
        .input-field,
        .auth-btn,
        .social-btn,
        button,
        select,
        a {
            min-height: 48px;
            font-size: 16px;
        }
        
        input[type="checkbox"] {
            width: 24px;
            height: 24px;
        }
        
        .auth-btn:active,
        .social-btn:active {
            transform: scale(0.98);
        }
        
        /* Prevent double-tap zoom */
        .auth-card {
            touch-action: manipulation;
        }
    }
    
    /* Fix iOS Input Styles */
    @supports (-webkit-touch-callout: none) {
        .input-field {
            -webkit-appearance: none;
            appearance: none;
        }
        
        select.input-field {
            background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24'%3E%3Cpath fill='%23ffffff' d='M7 10l5 5 5-5z'/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 8px center;
            padding-right: 32px;
        }
    }
</style>
