<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daffy - Sign Up</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: #000000;
      min-height: 100vh;
      color: #ffffff;
    }
    .signup-container {
      background: linear-gradient(135deg, #1e2761 80%, #facc15 100%);
      box-shadow: 0 8px 32px 0 rgba(30, 64, 175, 0.2);
      border-radius: 16px; /* Reduced from 24px */
      max-width: 800px; /* Reduced from default */
      margin: 0 auto;
    }
    .input-field {
      background: #2a2a2a;
      border: 1px solid #333333; /* Reduced from 2px */
      border-radius: 8px; /* Reduced from 12px */
      padding: 8px 12px; /* Reduced from 12px 16px */
      color: #ffffff;
      width: 100%;
      transition: all 0.3s ease;
      font-size: 0.9rem; /* Added smaller font */
    }
    .input-field:focus {
      border-color: #facc15;
      box-shadow: 0 0 0 2px rgba(250, 204, 21, 0.1);
      outline: none;
    }
    .signup-btn {
      background: linear-gradient(90deg, #1e2761 60%, #facc15 100%);
      color: white;
      padding: 8px 16px; /* Reduced from 12px 24px */
      border-radius: 9999px;
      font-weight: 600;
      transition: all 0.3s ease;
    }
    .signup-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(30, 64, 175, 0.2);
    }
    .error-message {
      color: #ff4444;
      font-size: 0.75rem; /* Reduced from 0.875rem */
      margin-top: 0.25rem; /* Reduced from 0.5rem */
    }
    /* Added compact spacing classes */
    .space-y-4 > * + * {
      margin-top: 1rem;
    }
    label {
      font-size: 0.85rem; /* Smaller label text */
      margin-bottom: 0.25rem !important;
      display: block;
    }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen p-2"> <!-- Reduced padding -->
  <div class="signup-container w-full p-5"> <!-- Reduced padding from p-8 -->
    <div class="text-center mb-4"> <!-- Reduced margin -->
      <h1 class="text-3xl font-bold text-white mb-1">Create Your Account</h1> <!-- Smaller heading -->
      <p class="text-gray-300 text-sm">Join Daffy and connect with your community</p> <!-- Smaller text -->
    </div>

    <form id="signupForm" class="space-y-4"> <!-- Reduced spacing from space-y-6 -->
      <!-- Personal Information -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-3"> <!-- Reduced gap from gap-6 -->
        <div>
          <label class="block text-gray-300 mb-2">Full Name</label>
          <input type="text" id="fullName" class="input-field" required>
        </div>
        <div>
          <label class="block text-gray-300 mb-2">Username</label>
          <input type="text" id="username" class="input-field" required>
        </div>
      </div>

      <!-- Role Selection -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label class="block text-gray-300 mb-2">Role</label>
          <select id="role" class="input-field" required onchange="toggleRoleFields()">
            <option value="student">Student</option>
            <option value="alumni">Alumni</option>
            <option value="teacher">Teacher</option>
          </select>
        </div>
        <div>
          <label class="block text-gray-300 mb-2">Department</label>
          <select id="department" class="input-field" required>
            <option value="">Select Department</option>
            <option value="CSE">Computer Science & Engineering</option>
            <option value="EEE">Electrical & Electronic Engineering</option>
            <option value="CE">Civil Engineering</option>
            <option value="ME">Mechanical Engineering</option>
            <option value="IPE">Industrial & Production Engineering</option>
            <option value="TE">Textile Engineering</option>
            <option value="ARCH">Architecture</option>
            <option value="URP">Urban & Regional Planning</option>
          </select>
        </div>
      </div>

      <!-- Student-specific Fields -->
      <div id="studentFields" class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label class="block text-gray-300 mb-2">Semester</label>
          <select id="semester" class="input-field" required>
            <option value="">Select Semester</option>
            <option value="1">1st Semester</option>
            <option value="2">2nd Semester</option>
            <option value="3">3rd Semester</option>
            <option value="4">4th Semester</option>
            <option value="5">5th Semester</option>
            <option value="6">6th Semester</option>
            <option value="7">7th Semester</option>
            <option value="8">8th Semester</option>
          </select>
        </div>
      </div>

      <!-- Alumni Fields -->
      <div id="alumniFields" class="grid grid-cols-1 md:grid-cols-2 gap-6" style="display: none;">
        <div>
          <label class="block text-gray-300 mb-2">Graduation Year</label>
          <input type="number" id="graduationYear" class="input-field" min="1900" max="2099">
        </div>
        <div>
          <label class="block text-gray-300 mb-2">Batch</label>
          <input type="text" id="alumniBatch" class="input-field" placeholder="e.g., CSE-2019">
        </div>
        <div>
          <label class="block text-gray-300 mb-2">Current Company</label>
          <input type="text" id="currentCompany" class="input-field">
        </div>
        <div>
          <label class="block text-gray-300 mb-2">Position</label>
          <input type="text" id="position" class="input-field">
        </div>
      </div>

      <!-- Teacher Fields -->
      <div id="teacherFields" class="grid grid-cols-1 md:grid-cols-2 gap-6" style="display: none;">
        <div>
          <label class="block text-gray-300 mb-2">Faculty ID</label>
          <input type="text" id="facultyId" class="input-field">
        </div>
        <div>
          <label class="block text-gray-300 mb-2">Designation</label>
          <input type="text" id="designation" class="input-field">
        </div>
        <div>
          <label class="block text-gray-300 mb-2">Joining Year</label>
          <input type="number" id="joinedYear" class="input-field" min="1900" max="2099">
        </div>
        <div>
          <label class="block text-gray-300 mb-2">Teacher's Batch</label>
          <input type="text" id="teacherBatch" class="input-field" placeholder="e.g., Faculty-2020">
        </div>
      </div>

      <!-- Contact Information -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label class="block text-gray-300 mb-2">Email</label>
          <input type="email" id="email" class="input-field" required>
        </div>
        <div>
          <label class="block text-gray-300 mb-2">Phone Number</label>
          <input type="tel" id="phone" class="input-field" required>
        </div>
      </div>

      <!-- Security -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label class="block text-gray-300 mb-2">Password</label>
          <input type="password" id="password" class="input-field" required>
        </div>
        <div>
          <label class="block text-gray-300 mb-2">Confirm Password</label>
          <input type="password" id="confirmPassword" class="input-field" required>
        </div>
      </div>

      <!-- Additional Information -->
      <div>
        <label class="block text-gray-300 mb-2">Bio (Optional)</label>
        <textarea id="bio" class="input-field" rows="2" placeholder="Tell us about yourself..."></textarea> <!-- Reduced rows -->
      </div>

      <!-- Terms and conditions with smaller text -->
      <div class="flex items-center">
        <input type="checkbox" id="terms" class="mr-2" required>
        <label for="terms" class="text-gray-300 text-xs">I agree to the Terms of Service and Privacy Policy</label> <!-- Smaller text -->
      </div>

      <button type="submit" class="signup-btn w-full text-sm py-2">Create Account</button> <!-- Smaller button -->
    </form>

    <p class="text-center mt-4 text-gray-300 text-xs"> <!-- Smaller text and margin -->
      Already have an account? <a href="login.html" class="text-[#facc15] hover:underline">Login here</a>
    </p>
  </div>
  
  <!-- Keep the existing scripts -->
</body>
</html>
