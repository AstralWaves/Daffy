<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daffy - Home</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: #000000;
      min-height: 100vh;
      color: #ffffff;
    }
    .signup-container {
      background: linear-gradient(135deg, #1e2761 80%, #facc15 100%);
      box-shadow: 0 8px 32px 0 rgba(30, 64, 175, 0.2);
      border-radius: 16px; /* Reduced from 24px */
      max-width: 800px; /* Reduced from default */
      margin: 0 auto;
    }
    .input-field {
      background: #2a2a2a;
      border: 1px solid #333333; /* Reduced from 2px */
      border-radius: 8px; /* Reduced from 12px */
      padding: 8px 12px; /* Reduced from 12px 16px */
      color: #ffffff;
      width: 100%;
      transition: all 0.3s ease;
      font-size: 0.9rem; /* Added smaller font */
    }
    .input-field:focus {
      border-color: #facc15;
      box-shadow: 0 0 0 2px rgba(250, 204, 21, 0.1);
      outline: none;
    }
    .signup-btn {
      background: linear-gradient(90deg, #1e2761 60%, #facc15 100%);
      color: white;
      padding: 8px 16px; /* Reduced from 12px 24px */
      border-radius: 9999px;
      font-weight: 600;
      transition: all 0.3s ease;
    }
    .signup-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(30, 64, 175, 0.2);
    }
    .error-message {
      color: #ff4444;
      font-size: 0.75rem; /* Reduced from 0.875rem */
      margin-top: 0.25rem; /* Reduced from 0.5rem */
    }
    /* Added compact spacing classes */
    .space-y-4 > * + * {
      margin-top: 1rem;
    }
    label {
      font-size: 0.85rem; /* Smaller label text */
      margin-bottom: 0.25rem !important;
      display: block;
    }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen p-2">
  <div class="home-container w-full p-8">
    <header class="text-center mb-6">
      <h1 class="text-3xl font-bold text-white mb-2">Welcome to Daffy!</h1>
      <p class="text-gray-300 text-sm mb-4">Your community, your way. Navigate below:</p>
      <nav>
        <a href="profile.html">Edit Profile</a>
        <a href="videos.html">Watch Videos</a>
        <a href="logout.html">Logout</a>
      </nav>
    </header>
    <main class="text-center">
      <h2 class="text-xl font-semibold mb-2">Home Page</h2>
      <p class="text-gray-200">Welcome! Use the navigation above to explore your profile, watch videos, and more.</p>
    </main>
  </div>
</body>
</html>
